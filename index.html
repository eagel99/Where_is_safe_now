<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>">
    <title>דשבורד התרעות – פיקוד העורף</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --red: #ef4444;
            --red-dim: #7f1d1d;
            --green: #22c55e;
            --green-dim: #14532d;
            --accent: #3b82f6;
            --accent-dim: #1e3a5f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

            header h1 {
                font-size: 1.75rem;
                margin-bottom: 0.25rem;
            }

            header p {
                color: var(--muted);
                font-size: 0.875rem;
            }

        .progress-container {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.75rem;
            text-align: center;
        }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.75rem 1.5rem;
            text-align: center;
        }

            .stat-chip .value {
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--accent);
            }

            .stat-chip .label {
                font-size: 0.75rem;
                color: var(--muted);
                margin-top: 0.125rem;
            }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
            width: 100%;
            max-width: 1100px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

            .card::before {
                content: "";
                position: absolute;
                top: 0;
                right: 0;
                left: 0;
                height: 3px;
            }

            .card.danger::before {
                background: var(--red);
            }

            .card.safe::before {
                background: var(--green);
            }

            .card.your-city {
                border-color: rgba(255, 255, 255, 0.25);
            }

            .card.your-city::before {
                background: var(--accent);
            }

            .card h2 {
                font-size: 1rem;
                margin-bottom: 0.25rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .card.danger h2 {
                color: var(--red);
            }

            .card.safe h2 {
                color: var(--green);
            }

            .card.your-city h2 {
                color: var(--accent);
            }

        .card-subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .card.danger .card-subtitle {
            color: var(--red);
            opacity: 0.7;
        }

        .card.safe .card-subtitle {
            color: var(--green);
            opacity: 0.7;
        }

        .city-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            position: relative;
            overflow: hidden;
        }

            .city-row .bar {
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                opacity: 0.12;
                border-radius: 0.5rem;
                transition: width 0.6s ease;
            }

        .card.danger .city-row .bar {
            background: var(--red);
        }

        .card.safe .city-row .bar {
            background: var(--green);
        }

        .city-row .rank {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .card.danger .city-row .rank {
            background: var(--red-dim);
            color: var(--red);
        }

        .card.safe .city-row .rank {
            background: var(--green-dim);
            color: var(--green);
        }

        .city-row .name {
            flex: 1;
            margin: 0 0.75rem;
            font-weight: 500;
            z-index: 1;
        }

        .city-row .count {
            font-weight: 700;
            font-size: 1.125rem;
            z-index: 1;
        }

        .card.danger .city-row .count {
            color: var(--red);
        }

        .card.safe .city-row .count {
            color: var(--green);
        }

        .city-select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            direction: rtl;
        }

            .city-select:focus {
                outline: none;
                border-color: var(--accent);
            }

        .city-result {
            text-align: center;
            padding: 1.5rem 0 0.5rem;
        }

            .city-result .count-display {
                font-size: 2.5rem;
                font-weight: 700;
                color: var(--accent);
            }

            .city-result .count-label {
                color: var(--muted);
                font-size: 0.875rem;
                margin-top: 0.25rem;
            }

        footer {
            margin-top: 2rem;
            color: var(--muted);
            font-size: 0.75rem;
            text-align: center;
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .spinner {
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 2rem;
            height: 2rem;
            animation: spin 0.8s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            background: var(--red-dim);
            color: var(--red);
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            max-width: 1100px;
            width: 100%;
        }

        .empty-state {
            color: var(--muted);
            text-align: center;
            padding: 1rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <header>
        <h1><span style="display:inline-block;transform:scaleX(-1)">🚀</span> דשבורד התרעות – פיקוד העורף 🚨</h1>
        <p>
            נתוני 7 ימים אחרונים &middot; מתעדכן כל 10 דקות
            <span class="live-dot"></span>
        </p>
    </header>

    <div class="progress-container" id="progress">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">מתחיל סריקה...</div>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div id="root">
        <div class="spinner"></div>
    </div>

    <footer id="footer"></footer>

    <script>
      const STREAM_API = "/api/alerts/stream";
      const API = "/api/alerts";
      const INTERVAL = 60_000;

      let currentData = null;
      let selectedCity = "";

      function escapeHTML(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function sumCounts(items) {
        return items.reduce((s, c) => s + c.count, 0);
      }

      function buildCityRows(items, maxCount) {
        if (!items.length) {
          return `<div class="empty-state">אין נתונים לתקופה זו</div>`;
        }
        return items
          .map(
            (item, i) => `
          <div class="city-row">
            <div class="bar" style="width:${Math.max((item.count / maxCount) * 100, 8)}%"></div>
            <span class="rank">${i + 1}</span>
            <span class="name">${escapeHTML(item.city)}</span>
            <span class="count">${item.count.toLocaleString()}</span>
          </div>`
          )
          .join("");
      }

      function buildCityOptions(allCities) {
        if (!allCities || !allCities.length) return "";
        return allCities
          .slice()
          .sort((a, b) => a.city.localeCompare(b.city, "he"))
          .map(
            (c) =>
              `<option value="${escapeHTML(c.city)}"${c.city === selectedCity ? " selected" : ""}>${escapeHTML(c.city)}</option>`
          )
          .join("");
      }

      function buildCityResult() {
        if (!selectedCity || !currentData || !currentData.allCities) {
          return `<div class="empty-state">בחר עיר מהרשימה</div>`;
        }
        const found = currentData.allCities.find((c) => c.city === selectedCity);
        const count = found ? found.count : 0;
        return `
          <div class="count-display">${count.toLocaleString()}</div>
          <div class="count-label">התרעות טילים וכטב״מים ב${escapeHTML(selectedCity)}</div>`;
      }

      function render(data) {
        currentData = data;
        const maxAll = data.most.length ? data.most[0].count : 1;
        const avgAlerts =
          data.totalCities > 0
            ? Math.ceil(data.totalAlerts / data.totalCities)
            : 0;

        const dangerTotal = sumCounts(data.most);
        const safeTotal = sumCounts(data.least);

        document.getElementById("statsBar").innerHTML = `
          <div class="stat-chip">
            <div class="value">${data.totalAlerts.toLocaleString()}</div>
            <div class="label">סה״כ התרעות טילים וכטב״מים</div>
          </div>
          <div class="stat-chip">
            <div class="value">${data.totalCities.toLocaleString()}</div>
            <div class="label">ערים שהותרעו</div>
          </div>
          <div class="stat-chip">
            <div class="value">${avgAlerts.toLocaleString()}</div>
            <div class="label">ממוצע הזעקות</div>
          </div>
          <div class="stat-chip">
            <div class="value">${escapeHTML(data.fromDate)} – ${escapeHTML(data.toDate)}</div>
            <div class="label">טווח תאריכים</div>
          </div>`;

        document.getElementById("root").innerHTML = `
          <div class="grid">
            <div class="card danger">
              <h2>🔴 הכי הרבה התרעות</h2>
              <div class="card-subtitle">סה״כ ${dangerTotal.toLocaleString()} הזעקות טילים + כטב״מים</div>
              ${buildCityRows(data.most, maxAll)}
            </div>
            <div class="card your-city">
              <h2>🏙️ בעיר שלך</h2>
              <select class="city-select" id="citySelect">
                <option value="">בחר עיר...</option>
                ${buildCityOptions(data.allCities)}
              </select>
              <div class="city-result" id="cityResult">
                ${buildCityResult()}
              </div>
            </div>
            <div class="card safe">
              <h2>🟢 הכי מעט התרעות</h2>
              <div class="card-subtitle">סה״כ ${safeTotal.toLocaleString()} הזעקות טילים + כטב״מים</div>
              ${buildCityRows(data.least, maxAll)}
            </div>
          </div>`;

        const time = new Date(data.updatedAt).toLocaleTimeString("he-IL");
        document.getElementById("footer").textContent =
          `עדכון אחרון: ${time} · מקור: פיקוד העורף`;
      }

      // Event delegation – survives innerHTML replacements
      document.getElementById("root").addEventListener("change", (e) => {
        if (e.target.id === "citySelect") {
          selectedCity = e.target.value;
          const resultEl = document.getElementById("cityResult");
          if (resultEl) resultEl.innerHTML = buildCityResult();
        }
      });

      function renderError(msg) {
        document.getElementById("root").innerHTML = `
          <div class="error-msg">⚠️ שגיאה בטעינת הנתונים: ${escapeHTML(msg)}</div>`;
      }

      // ── SSE streaming on initial load ─────────────────────────────────
      function connectStream() {
        const progressEl = document.getElementById("progress");
        const fillEl = document.getElementById("progressFill");
        const textEl = document.getElementById("progressText");

        progressEl.style.display = "block";

        const es = new EventSource(STREAM_API);
        let completed = false;

        es.addEventListener("progress", (e) => {
          const d = JSON.parse(e.data);
          const pct = Math.round((d.done / d.total) * 100);
          fillEl.style.width = `${pct}%`;
          textEl.textContent = `בודק: ${d.city}  (${d.done}/${d.total})`;
        });

        es.addEventListener("update", (e) => {
          render(JSON.parse(e.data));
        });

        es.addEventListener("done", (e) => {
          completed = true;
          render(JSON.parse(e.data));
          progressEl.style.display = "none";
          es.close();
          // Switch to polling the cached endpoint
          setInterval(pollCached, INTERVAL);
        });

        es.onerror = () => {
          if (!completed) {
            progressEl.style.display = "none";
            renderError("החיבור לשרת נותק");
          }
          es.close();
        };
      }

      async function pollCached() {
        try {
          const res = await fetch(API);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          render(data);
        } catch (err) {
          renderError(err.message);
        }
      }

      connectStream();
    </script>
</body>
</html>
